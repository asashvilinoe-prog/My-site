<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ной • 41</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

* {
margin: 0;
padding: 0;
box-sizing: border-box;
}

body {
background: #000;
color: #fff;
font-family: 'VT323', monospace;
overflow: hidden;
height: 100vh;
display: flex;
align-items: center;
justify-content: center;
text-align: center;
position: relative;
}

canvas {
position: absolute;
top: 0;
left: 0;
z-index: 1;
}

.content {
z-index: 2;
max-width: 800px;
padding: 20px;
}

h1 {
font-size: 3.5rem;
margin-bottom: 20px;
text-shadow: 0 0 20px #fff;
letter-spacing: 4px;
}

p {
font-size: 1.8rem;
line-height: 1.6;
margin: 25px 0;
}

.stars {
color: #fff;
font-size: 2rem;
}

.section {
margin: 40px 0;
padding: 15px;
border: 2px solid rgba(255,255,255,0.2);
border-radius: 8px;
}
</style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="content">
<h1>🌌 НОЙ 🌌</h1>

<p>Привет спасибо что зашёл на мой сайт</p>

<div class="section">
<p>Меня зовут <strong>Ной</strong><br>мне 41 🔄</p>
</div>

<div class="section">
<p><strong>ФД:</strong><br>
Gravity Falls, TheBrianMaps, DSMP,<br>
⭐️🦋, 1 сезон Squid Game,<br>
ОСД, Adventure Time, We Bare Bears...</p>
</div>

<div class="section">
<p><strong>DNI if u:</strong><br>
🏳️‍⚧️🏳️‍🌈❌️, 👦🏿👧🏿🚫, or etc...</p>
</div>

<div class="section">
<p>Языки которые я знаю:<br>
<strong>Грузинский • Русский • Английский</strong></p>
</div>

<p class="stars">♏️</p>
</div>

<script>
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');

function resize() {
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

let stars = [];
for (let i = 0; i < 800; i++) {
stars.push({
x: Math.random() * canvas.width,
y: Math.random() * canvas.height,
size: Math.random() * 2.5 + 0.5,
speed: Math.random() * 0.02 + 0.005
});
}

function draw() {
ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
ctx.fillRect(0, 0, canvas.width, canvas.height);

ctx.fillStyle = '#ffffff';
stars.forEach(star => {
ctx.globalAlpha = Math.random() * 0.8 + 0.4;
ctx.beginPath();
ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
ctx.fill();

star.y += star.speed;
if (star.y > canvas.height) star.y = 0;
});

requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
